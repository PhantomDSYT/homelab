services:
  traefik:
    image: traefik:v3.6.7
    container_name: traefik

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"

    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs
      - ./logs:/var/log/traefik

    networks:
      - traefik

networks:
  traefik:
    driver: bridge